name: code-style

# Runs Laravel Pint in --test mode. Unlike the previous auto-fix workflow
# this job FAILS on style issues instead of committing back — contributors
# run `composer format` locally before pushing (or the CI turns red).
#
# Why no auto-fix: bot commits clutter the log, confuse `git blame`, and
# race against rapid push sequences. A clean fail is more honest feedback.

on:
  push:
    paths:
      - '**.php'
      - 'pint.json'
      - '.github/workflows/code-style.yml'
  pull_request:
    paths:
      - '**.php'
      - 'pint.json'

jobs:
  pint:
    name: Pint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint in test mode
        run: vendor/bin/pint --test
